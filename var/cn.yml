node:
  - name: NODE
    type: test
    content: -a
    a-ico: arrow.triangle.swap.system
  - name: JP
    type: test
    content: (?<![a-zA-Z])((JP)|(Japan)|(Tokyo))(?![a-zA-Z])|(?<!尼)日
    a-ico: arrow.triangle.swap.system
  - name: TW
    type: test
    content: (?<![a-zA-Z])((TW)|(Taiwan))(?![a-zA-Z])|臺|台
    a-ico: arrow.triangle.swap.system
  - name: US
    type: test
    content: (?<![a-zA-Z])((US)|(NY)|(LA))(?![a-zA-Z])|美
    a-ico: arrow.triangle.swap.system
filter:
  - name: direct
    type: [domain, ipcidr]
    content: DIRECT
  - name: global
    type: [domain]
    content: PROXY
  - name: system
    type: [domain, ipcidr]
    content: DIRECT
  - name: block
    type: [domain]
    content: REJECT
  - name: region
    type: [domain]
    content: PROXY
  - name: r-cn
    type: [domain]
    content: DIRECT
  - name: r-jp
    type: [domain]
    content: JP
  - name: r-tw
    type: [domain]
    content: TW
  - name: r-us
    type: [domain]
    content: US
  - name: CN
    type: geoip
    content: DIRECT
  - type: final
    content: PROXY
