meta:
  base: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/
  interval: 86400
  t-http: http://1.1.1.1/
  t-dns: cloudflare.com@1.1.1.1
dns:
  plain:
    - 1.1.1.1
    - 1.0.0.1
  doh: https://cloudflare-dns.com/dns-query
node:
  - name: _GLOBAL
    type: static
    content:
      [DIRECT, CN, DE, GB, JP, SG, TW, US, NODE, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.arrow.right.system
  - name: _SYSTEM
    type: static
    content: [_GLOBAL, DIRECT, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.and.right.system
  - name: _REGION
    type: static
    content:
      [DIRECT, CN, DE, GB, JP, SG, TW, US, NODE, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.arrow.right.system
  - name: _CN
    type: static
    content: [_REGION, DIRECT, CN, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.and.right.system
  - name: _JP
    type: static
    content: [_REGION, DIRECT, JP, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.and.right.system
  - name: _TW
    type: static
    content: [_REGION, DIRECT, TW, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.and.right.system
  - name: _US
    type: static
    content: [_REGION, DIRECT, US, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.and.right.system
  - name: NODE0
    type: static
    content: -a
    a-ico: arrow.triangle.branch.system
  - name: NODE1
    type: static
    content: -a
    a-ico: arrow.triangle.branch.system
  - name: NODE2
    type: static
    content: -a
    a-ico: arrow.triangle.branch.system
  - name: NODE3
    type: static
    content: -a
    a-ico: arrow.triangle.branch.system
  - name: NODE
    type: test
    content: -a
    a-ico: arrow.triangle.swap.system
  - name: CN
    type: test
    content: (?<![a-zA-Z])((CN)|(CHN)|(China))(?![a-zA-Z])|中
    a-ico: arrow.triangle.swap.system
  - name: DE
    type: test
    content: (?<![a-zA-Z])((DE)|(German)|(Berlin))(?![a-zA-Z])|德
    a-ico: arrow.triangle.swap.system
  - name: GB
    type: test
    content: (?<![a-zA-Z])((?<![0-9])(GB)|(UK)|(London))(?![a-zA-Z])|英
    a-ico: arrow.triangle.swap.system
  - name: JP
    type: test
    content: (?<![a-zA-Z])((JP)|(Japan)|(Tokyo))(?![a-zA-Z])|(?<!尼)日
    a-ico: arrow.triangle.swap.system
  - name: SG
    type: test
    content: (?<![a-zA-Z])((SG)|(Singapore))(?![a-zA-Z])|新|(獅|狮城)
    a-ico: arrow.triangle.swap.system
  - name: TW
    type: test
    content: (?<![a-zA-Z])((TW)|(Taiwan))(?![a-zA-Z])|臺|台
    a-ico: arrow.triangle.swap.system
  - name: US
    type: test
    content: (?<![a-zA-Z])((US)|(NY)|(LA))(?![a-zA-Z])|美
    a-ico: arrow.triangle.swap.system
filter:
  - name: DIRECT
    type: [domain, ipcidr]
    content: filter/direct
  - name: _GLOBAL
    type: [domain]
    content: filter/global
  - name: _SYSTEM
    type: [domain, ipcidr]
    content: filter/system
  - name: REJECT
    type: [domain]
    content: filter/block
  - name: _REGION
    type: [domain]
    content: filter/region
  - name: _CN
    type: [domain]
    content: filter/r-cn
  - name: _JP
    type: [domain]
    content: filter/r-jp
  - name: _TW
    type: [domain]
    content: filter/r-tw
  - name: _US
    type: [domain]
    content: filter/r-us
  - name: _CN
    type: geoip
    content: CN
  - name: _GLOBAL
    type: final
