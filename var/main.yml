meta:
  base: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/
  interval: 86400
  t-http: http://1.1.1.1/
  t-dns: cloudflare.com@1.1.1.1
dns:
  plain:
    - 1.1.1.1
    - 1.0.0.1
  doh: https://cloudflare-dns.com/dns-query
node:
  - name: DEFAULT
    type: static
    content:
      [DIRECT, NODE, CN, DE, GB, JP, SG, TW, US, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.arrow.right.system
  - name: SYSTEM
    type: static
    content: [DEFAULT, DIRECT, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.and.right.system
  - name: REGION
    type: static
    content:
      [DIRECT, NODE, CN, DE, GB, JP, SG, TW, US, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.arrow.right.system
  - name: R-CN
    type: static
    content: [REGION, DIRECT, CN, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.and.right.system
  - name: R-JP
    type: static
    content: [REGION, DIRECT, JP, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.and.right.system
  - name: R-TW
    type: static
    content: [REGION, DIRECT, TW, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.and.right.system
  - name: R-US
    type: static
    content: [REGION, DIRECT, US, NODE0, NODE1, NODE2, NODE3]
    a-ico: arrow.left.and.right.system
  - name: NODE
    type: test
    content: -a
    a-ico: arrow.triangle.swap.system
  - name: NODE0
    type: static
    content: -a
    a-ico: arrow.triangle.branch.system
  - name: NODE1
    type: static
    content: -a
    a-ico: arrow.triangle.branch.system
  - name: NODE2
    type: static
    content: -a
    a-ico: arrow.triangle.branch.system
  - name: NODE3
    type: static
    content: -a
    a-ico: arrow.triangle.branch.system
  - name: CN
    type: test
    content: (?<![a-zA-Z])((CN)|(CHN)|(China))(?![a-zA-Z])|中
    a-ico: arrow.triangle.swap.system
  - name: DE
    type: test
    content: (?<![a-zA-Z])((DE)|(German)|(Berlin))(?![a-zA-Z])|德
    a-ico: arrow.triangle.swap.system
  - name: GB
    type: test
    content: (?<![a-zA-Z])((?<![0-9])(GB)|(UK)|(London))(?![a-zA-Z])|英
    a-ico: arrow.triangle.swap.system
  - name: JP
    type: test
    content: (?<![a-zA-Z])((JP)|(Japan)|(Tokyo))(?![a-zA-Z])|(?<!尼)日
    a-ico: arrow.triangle.swap.system
  - name: SG
    type: test
    content: (?<![a-zA-Z])((SG)|(Singapore))(?![a-zA-Z])|新|(獅|狮城)
    a-ico: arrow.triangle.swap.system
  - name: TW
    type: test
    content: (?<![a-zA-Z])((TW)|(Taiwan))(?![a-zA-Z])|臺|台
    a-ico: arrow.triangle.swap.system
  - name: US
    type: test
    content: (?<![a-zA-Z])((US)|(NY)|(LA))(?![a-zA-Z])|美
    a-ico: arrow.triangle.swap.system
filter:
  - name: direct
    type: [domain, ipcidr]
    content: DIRECT
  - name: global
    type: [domain]
    content: DEFAULT
  - name: system
    type: [domain, ipcidr]
    content: SYSTEM
  - name: block
    type: [domain]
    content: REJECT
  - name: region
    type: [domain]
    content: REGION
  - name: r-cn
    type: [domain]
    content: R-CN
  - name: r-jp
    type: [domain]
    content: R-JP
  - name: r-tw
    type: [domain]
    content: R-TW
  - name: r-us
    type: [domain]
    content: R-US
  - name: CN
    type: geoip
    content: R-CN
  - type: final
    content: DEFAULT
