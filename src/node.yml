- type: static
  name: DEFAULT
  content:
    [DIRECT, NODE, CN, DE, GB, JP, SG, TW, US, NODE0, NODE1, NODE2, NODE3]
  a-ico: arrow.left.arrow.right.system
- type: static
  name: SYSTEM
  content: [DEFAULT, DIRECT, NODE0, NODE1, NODE2, NODE3]
  a-ico: arrow.left.and.right.system
- type: static
  name: REGION
  content:
    [DIRECT, NODE, CN, DE, GB, JP, SG, TW, US, NODE0, NODE1, NODE2, NODE3]
  a-ico: arrow.left.arrow.right.system
- type: static
  name: R-CN
  content: [REGION, DIRECT, CN, NODE0, NODE1, NODE2, NODE3]
  a-ico: arrow.left.and.right.system
- type: static
  name: R-JP
  content: [REGION, DIRECT, JP, NODE0, NODE1, NODE2, NODE3]
  a-ico: arrow.left.and.right.system
- type: static
  name: R-TW
  content: [REGION, DIRECT, TW, NODE0, NODE1, NODE2, NODE3]
  a-ico: arrow.left.and.right.system
- type: static
  name: R-US
  content: [REGION, DIRECT, US, NODE0, NODE1, NODE2, NODE3]
  a-ico: arrow.left.and.right.system
- type: test
  name: NODE
  content: .*
  a-ico: arrow.triangle.swap.system
- type: static
  name: NODE0
  content: .*
  a-ico: arrow.triangle.branch.system
- type: static
  name: NODE1
  content: .*
  a-ico: arrow.triangle.branch.system
- type: static
  name: NODE2
  content: .*
  a-ico: arrow.triangle.branch.system
- type: static
  name: NODE3
  content: .*
  a-ico: arrow.triangle.branch.system
- type: test
  name: CN
  content: (?<![a-zA-Z])((CN)|(CHN)|(China))(?![a-zA-Z])|中
  a-ico: arrow.triangle.swap.system
- type: test
  name: DE
  content: (?<![a-zA-Z])((DE)|(German)|(Berlin))(?![a-zA-Z])|德
  a-ico: arrow.triangle.swap.system
- type: test
  name: GB
  content: (?<![a-zA-Z])((?<![0-9])(GB)|(UK)|(London))(?![a-zA-Z])|英
  a-ico: arrow.triangle.swap.system
- type: test
  name: JP
  content: (?<![a-zA-Z])((JP)|(Japan)|(Tokyo))(?![a-zA-Z])|(?<!尼)日
  a-ico: arrow.triangle.swap.system
- type: test
  name: SG
  content: (?<![a-zA-Z])((SG)|(Singapore))(?![a-zA-Z])|新|(獅|狮城)
  a-ico: arrow.triangle.swap.system
- type: test
  name: TW
  content: (?<![a-zA-Z])((TW)|(Taiwan))(?![a-zA-Z])|台|臺
  a-ico: arrow.triangle.swap.system
- type: test
  name: US
  content: (?<![a-zA-Z])((US)|(NY)|(LA))(?![a-zA-Z])|美
  a-ico: arrow.triangle.swap.system
