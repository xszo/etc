  - DEFAULT
  - DIRECT
  - NODE0
  - NODE1
  - NODE2
  - NODE3
  type: select
- name: REGION
  proxies:
  - DIRECT
  - CN
  - DE
  - GB
  - HK
  - JP
  - SG
  - TW
  - US
  - NODE
  - NODE0
  - NODE1
  - NODE2
  - NODE3
