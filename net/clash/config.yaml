allow-lan: false
dns:
  default-nameserver:
  - 223.5.5.5
  - 223.6.6.6
  - '[2400:3200::1]'
  - '[2400:3200:baba::1]'
  enable: true
  enhanced-mode: fake-ip
  fake-ip-filter:
  - +.lan
  - +.local
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:8424
  nameserver:
  - https://dns.alidns.com/dns-query
external-controller: 127.0.0.1:8420
log-level: silent
mixed-port: 8422
mode: rule
profile:
  store-fake-ip: true
  store-selected: true
proxy-groups:
- name: DEFAULT
  proxies:
  - DIRECT
  - CN
  - DE
  - GB
  - HK
  - JP
  - SG
  - TW
  - US
  - NODE
  - NODE0
  - NODE1
  - NODE2
  - NODE3
