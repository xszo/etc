  - DIRECT
  - US
  - NODE0
  - NODE1
  - NODE2
  - NODE3
  type: select
- filter: .*
  include-all: true
  interval: 600
  lazy: true
  name: NODE
  type: url-test
  url: http://1.1.1.1/
- filter: .*
  include-all: true
  name: NODE0
  type: select
- filter: .*
  include-all: true
  name: NODE1
  type: select
- filter: .*
  include-all: true
  name: NODE2
  type: select
- filter: .*
  include-all: true
  name: NODE3
  type: select
- filter: "(?<![a-zA-Z])((CN)|(CHN)|(China))(?![a-zA-Z])|\u4E2D"
  include-all: true
  interval: 600
  lazy: true
  name: CN
  type: url-test
  url: http://1.1.1.1/
- filter: "(?<![a-zA-Z])((DE)|(German)|(Berlin))(?![a-zA-Z])|\u5FB7"
  include-all: true
  interval: 600
  lazy: true
  name: DE
  type: url-test
  url: http://1.1.1.1/
- filter: "(?<![a-zA-Z])((?<![0-9])(GB)|(UK)|(London))(?![a-zA-Z])|\u82F1"
  include-all: true
  interval: 600
  lazy: true
  name: GB
  type: url-test
  url: http://1.1.1.1/
- filter: "(?<![a-zA-Z])((HK)|(Hong ?Kong))|\u6E2F"
  include-all: true
  interval: 600
  lazy: true
  name: HK
  type: url-test
  url: http://1.1.1.1/
- filter: "(?<![a-zA-Z])((JP)|(Japan)|(Tokyo))(?![a-zA-Z])|(?<!\u5C3C)\u65E5"
  include-all: true
  interval: 600
  lazy: true
  name: JP
  type: url-test
  url: http://1.1.1.1/
- filter: "(?<![a-zA-Z])((SG)|(Singapore))(?![a-zA-Z])|\u65B0|(\u7345|\u72EE\u57CE\
    )"
  include-all: true
  interval: 600
  lazy: true
  name: SG
  type: url-test
  url: http://1.1.1.1/
- filter: "(?<![a-zA-Z])((TW)|(Taiwan))(?![a-zA-Z])|\u53F0|\u81FA"
  include-all: true
  interval: 600
  lazy: true
  name: TW
  type: url-test
  url: http://1.1.1.1/
- filter: "(?<![a-zA-Z])((US)|(NY)|(LA))(?![a-zA-Z])|\u7F8E"
  include-all: true
  interval: 600
  lazy: true
  name: US
  type: url-test
  url: http://1.1.1.1/
