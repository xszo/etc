[General]
update-url = https://cdn.jsdelivr.net/gh/xszo/etc@o/net/other/shadowrocket.conf
hijack-dns = *:53
dns-server = system, https://dns.alidns.com/dns-query

[Proxy Group]
JP = url-test, url=http://1.1.1.1/, policy-regex-filter=(?<![a-zA-Z])((JP)|(Japan)|(Tokyo))(?![a-zA-Z])|(?<!尼)日
TW = url-test, url=http://1.1.1.1/, policy-regex-filter=(?<![a-zA-Z])((TW)|(Taiwan))(?![a-zA-Z])|台|臺
US = url-test, url=http://1.1.1.1/, policy-regex-filter=(?<![a-zA-Z])((US)|(NY)|(LA))(?![a-zA-Z])|美

