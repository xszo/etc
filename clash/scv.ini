[custom]
clash_rule_base=https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/scv.yml

add_emoji=false
remove_old_emoji=false

custom_proxy_group=_GLOBAL`select`[]DIRECT`[]CN`[]DE`[]GB`[]JP`[]SG`[]TW`[]US`[]NODE`[]NODE0`[]NODE1`[]NODE2`[]NODE3
custom_proxy_group=_SYSTEM`select`[]_GLOBAL`[]DIRECT`[]NODE0`[]NODE1`[]NODE2`[]NODE3
custom_proxy_group=_REGION`select`[]DIRECT`[]CN`[]DE`[]GB`[]JP`[]SG`[]TW`[]US`[]NODE`[]NODE0`[]NODE1`[]NODE2`[]NODE3
custom_proxy_group=_CN`select`[]_REGION`[]DIRECT`[]CN`[]NODE0`[]NODE1`[]NODE2`[]NODE3
custom_proxy_group=_JP`select`[]_REGION`[]DIRECT`[]JP`[]NODE0`[]NODE1`[]NODE2`[]NODE3
custom_proxy_group=_TW`select`[]_REGION`[]DIRECT`[]TW`[]NODE0`[]NODE1`[]NODE2`[]NODE3
custom_proxy_group=_US`select`[]_REGION`[]DIRECT`[]US`[]NODE0`[]NODE1`[]NODE2`[]NODE3

custom_proxy_group=NODE0`select`.*
custom_proxy_group=NODE1`select`.*
custom_proxy_group=NODE2`select`.*
custom_proxy_group=NODE3`select`.*

custom_proxy_group=NODE`url-test`.*`http://1.1.1.1/`600
custom_proxy_group=CN`url-test`(?<![a-zA-Z])((CN)|(CHN)|(China))(?![a-zA-Z])|(🇨🇳)|中|(回国)`http://1.1.1.1/`600
custom_proxy_group=DE`url-test`(?<![a-zA-Z])((DE)|(German)|(Berlin))(?![a-zA-Z])|(🇩🇪)|德`http://1.1.1.1/`600
custom_proxy_group=GB`url-test`(?<![a-zA-Z])((?<![0-9]\s?)(GB)|(UK)|(London))(?![a-zA-Z])|(🇬🇧)|英`http://1.1.1.1/`600
custom_proxy_group=JP`url-test`(?<![a-zA-Z])((JP)|(Japan)|(Tokyo))(?![a-zA-Z])|(🇯🇵)|(?<!尼)日`http://1.1.1.1/`600
custom_proxy_group=SG`url-test`(?<![a-zA-Z])((SG)|(Singapore))(?![a-zA-Z])|(🇸🇬)|新|(獅|狮城)`http://1.1.1.1/`600
custom_proxy_group=TW`url-test`(?<![a-zA-Z])((TW)|(Taiwan))(?![a-zA-Z])|(🇹🇼)|臺|台`http://1.1.1.1/`600
custom_proxy_group=US`url-test`(?<![a-zA-Z])((US)|(NY)|(LA))(?![a-zA-Z])|(🇺🇸)|美`http://1.1.1.1/`600

enable_rule_generator=true
overwrite_original_rules=true
ruleset=DIRECT,clash-domain:https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/direct.yml
ruleset=_GLOBAL,clash-domain:https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/global.yml
ruleset=_SYSTEM,clash-domain:https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/system.yml
ruleset=REJECT,clash-domain:https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/block.yml
ruleset=_REGION,clash-domain:https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/region.yml
ruleset=_CN,clash-domain:https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/r-cn.yml
ruleset=_JP,clash-domain:https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/r-jp.yml
ruleset=_TW,clash-domain:https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/r-tw.yml
ruleset=_US,clash-domain:https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/r-us.yml
ruleset=DIRECT,clash-ipcidr:https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/direct.ip.yml
ruleset=_SYSTEM,clash-ipcidr:https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/system.ip.yml
ruleset=_CN,[]GEOIP,CN
ruleset=_GLOBAL,[]FINAL
