log-level: silent
mode: rule

mixed-port: 8421
allow-lan: false
tun:
  enable: true
  stack: gvisor
  dns-hijack: [198.18.0.2:53]
  auto-route: true
  auto-detect-interface: true

dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - https://dns.alidns.com/dns-query
