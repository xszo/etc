log-level: silent
mode: rule
dns:
  fake-ip-filter:
    - +.lan
    - +.local
  default-nameserver: [system]
  nameserver: [system]
proxy-groups:
  - name: _GLOBAL
    type: select
    proxies:
      [DIRECT, CN, DE, GB, JP, SG, TW, US, NODE, NODE0, NODE1, NODE2, NODE3]
  - name: _SYSTEM
    type: select
    proxies: [_GLOBAL, DIRECT, NODE0, NODE1, NODE2, NODE3]
  - name: _REGION
    type: select
    proxies:
      [DIRECT, CN, DE, GB, JP, SG, TW, US, NODE, NODE0, NODE1, NODE2, NODE3]
  - name: _CN
    type: select
    proxies: [_REGION, DIRECT, CN, NODE0, NODE1, NODE2, NODE3]
  - name: _JP
    type: select
    proxies: [_REGION, DIRECT, JP, NODE0, NODE1, NODE2, NODE3]
  - name: _TW
    type: select
    proxies: [_REGION, DIRECT, TW, NODE0, NODE1, NODE2, NODE3]
  - name: _US
    type: select
    proxies: [_REGION, DIRECT, US, NODE0, NODE1, NODE2, NODE3]
  - { name: NODE0, type: select, include-all: true }
  - { name: NODE1, type: select, include-all: true }
  - { name: NODE2, type: select, include-all: true }
  - { name: NODE3, type: select, include-all: true }
  - name: NODE
    type: url-test
    lazy: true
    url: http://1.1.1.1/
    include-all: true
  - name: CN
    type: url-test
    lazy: true
    url: http://1.1.1.1/
    include-all: true
    filter: (?<![a-zA-Z])((CN)|(CHN)|(China))(?![a-zA-Z])|(🇨🇳)|中|(回国)
  - name: DE
    type: url-test
    lazy: true
    url: http://1.1.1.1/
    include-all: true
    filter: (?<![a-zA-Z])((DE)|(German)|(Berlin))(?![a-zA-Z])|(🇩🇪)|德
  - name: GB
    type: url-test
    lazy: true
    url: http://1.1.1.1/
    include-all: true
    filter: (?<![a-zA-Z])((?<![0-9]\s?)(GB)|(UK)|(London))(?![a-zA-Z])|(🇬🇧)|英
  - name: JP
    type: url-test
    lazy: true
    url: http://1.1.1.1/
    include-all: true
    filter: (?<![a-zA-Z])((JP)|(Japan)|(Tokyo))(?![a-zA-Z])|(🇯🇵)|(?<!尼)日
  - name: SG
    type: url-test
    lazy: true
    url: http://1.1.1.1/
    include-all: true
    filter: (?<![a-zA-Z])((SG)|(Singapore))(?![a-zA-Z])|(🇸🇬)|新|(獅|狮城)
  - name: TW
    type: url-test
    lazy: true
    url: http://1.1.1.1/
    include-all: true
    filter: (?<![a-zA-Z])((TW)|(Taiwan))(?![a-zA-Z])|(🇹🇼)|臺|台
  - name: US
    type: url-test
    lazy: true
    url: http://1.1.1.1/
    include-all: true
    filter: (?<![a-zA-Z])((US)|(NY)|(LA))(?![a-zA-Z])|(🇺🇸)|美
rule-providers:
  DIRECT:
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/direct.yml
    interval: 86400
  DIRECT-IP:
    behavior: ipcidr
    url: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/direct.ip.yml
    interval: 86400
  GLOBAL:
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/global.yml
    interval: 86400
  SYSTEM:
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/system.yml
    interval: 86400
  BLOCK:
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/block.yml
    interval: 86400
  REGION:
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/region.yml
    interval: 86400
  R-CN:
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/r-cn.yml
    interval: 86400
  R-JP:
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/r-jp.yml
    interval: 86400
  R-TW:
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/r-tw.yml
    interval: 86400
  R-US:
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/xszo/etc@o/net/clash/filter/r-us.yml
    interval: 86400
rules:
  - RULE-SET, DIRECT, DIRECT
  - RULE-SET, GLOBAL, _GLOBAL
  - RULE-SET, SYSTEM, _SYSTEM
  - RULE-SET, BLOCK, REJECT
  - RULE-SET, REGION, _REGION
  - RULE-SET, R-CN, _CN
  - RULE-SET, R-JP, _JP
  - RULE-SET, R-TW, _TW
  - RULE-SET, R-US, _US
  - RULE-SET, DIRECT-IP, DIRECT
  - GEOIP, CN, _CN
  - MATCH, _GLOBAL
